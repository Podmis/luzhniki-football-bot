# (dev) Отправляем опрос в футбольный чат
name: dev_Create-poll
on:
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Set date
        run: |
          Day0=86400 # Один день
          # Завтрашний день
          TOMORROW_DAY=$(($(TZ='Europe/Moscow' date +%s) + $Day0))
          DATE=$(TZ='Europe/Moscow' date -d "@$TOMORROW_DAY" +'%d.%m')
          echo "DATE=$DATE" >> $GITHUB_ENV          

          # Дни недели (1-7, где 1 = понедельник)
          WEEKDAY_NUM=$(TZ='Europe/Moscow' date -d "@$TOMORROW_DAY" +'%u')
          case $WEEKDAY_NUM in
            1) WEEKDAY="пн" ;;
            2) WEEKDAY="вт" ;;
            3) WEEKDAY="ср" ;;
            4) WEEKDAY="чт" ;;
            5) WEEKDAY="пт" ;;
            6) WEEKDAY="сб" ;;
            7) WEEKDAY="вс" ;;
          esac
          echo "WEEKDAY=$WEEKDAY" >> $GITHUB_ENV

      - name: Create and pin poll
        run: |
          # Отправляем опрос и сохраняем ответ
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendPoll" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "'"$DEV_CHAT_ID"'",
              "question": "Сбор на '"$DATE"' ('"$WEEKDAY"')",
              "options": [
                "Играю 🟢",
                "Играю 🟠",
                "Основной пропускаю ❌",
                "Основной замена 🔄", 
                "Запасной играю ⚽",
                "Запасной пропускаю ❌",
                "Приглашенная звезда ⭐"
              ],
              "is_anonymous": false
            }')

          # Извлекаем message_id через grep и sed (без jq)
          MESSAGE_ID=$(echo "$RESPONSE" | grep -o '"message_id":[0-9]*' | head -1 | grep -o '[0-9]*')

          echo "Message ID: $MESSAGE_ID"

          # Закрепляем опрос
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/pinChatMessage" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "'"$DEV_CHAT_ID"'",
              "message_id": '$MESSAGE_ID',
              "disable_notification": false,
              "allows_multiple_answers": true
            }'

          echo "✅ Poll created and pinned with notification"
        env:
          BOT_TOKEN: ${{ secrets.Bot_Token }}
          DEV_CHAT_ID: ${{ secrets.dev_Chat_Id }}
