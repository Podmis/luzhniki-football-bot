name: Create poll
on:
  workflow_dispatch: # Ручной запуск (кнопкой в интерфейсе GitHub)
  schedule:
    # Каждое воскресенье в 10:00 по московскому времени (UTC+3)
    # Cron: минуты часы дни месяцы дни_недели
    # 0    7    *   *      0
    #- cron: "0 7 * * 0" # 7 часов UTC = 10 часов Москва (UTC+3)
    - cron: "*/5 * * * *" # Каждые 5 минут

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      # Получаем текущую дату по Москве в формате ДД.ММ
      - run: echo "DATE=$(TZ='Europe/Moscow' date +'%d.%m')" >> $GITHUB_ENV

      - name: Create poll
        run: |
          curl -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendPoll" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "'"$CHAT_ID"'",
              "question": "Сбор на '"$DATE"'",
              "options": [
          "Запасной пропускаю ❌",
          "Играю 🟢",
          "Играю 🟠",
          "Приглашенная звезда ⭐",
          "Основной пропускаю ❌",
          "Запасной играю"],
              "is_anonymous": false
            }'
        env:
          BOT_TOKEN: ${{ secrets.Bot_Token }}
          CHAT_ID: ${{ secrets.Chat_Id }}

