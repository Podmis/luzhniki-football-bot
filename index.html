<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex,nofollow" />
    <script src="telegram-web-app.js"></script>
</head>

<body>
    <div style="font-size: 32px; font-weight: bold; color: red;border: 2px solid #ffff; ">
        luzhniki-football-bot
    </div>
    <div style="font-size: 32px; font-weight: bold; color: black;border: 2px solid #000000; ">
        luzhniki-football-bot
    </div>

    <script>
        if (window.Telegram && Telegram.WebApp) {
            const tg = Telegram.WebApp;
            tg.ready();
            alert("Hello from bot v3!");
            const messageData = { text: "Hello from bot!" };
            tg.sendData(JSON.stringify(messageData));
            setTimeout(() => tg.close(), 1500);
        }
    </script>

</body>

</html>
